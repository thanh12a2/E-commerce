{% if messages %}
<div class="messages-wrap">
  {% for message in messages %}
  <div class="msg {% if message.tags == 'success' %}msg-success{% elif message.tags == 'error' %}msg-error{% elif message.tags == 'warning' %}msg-warning{% else %}msg-info{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
